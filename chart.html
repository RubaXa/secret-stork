<head>

<title>Аналитика имён · Москва 2015–2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--card:#fff;--cb:rgba(0,0,0,.08);--cbh:rgba(0,0,0,.15);
  --hbg:rgba(247,246,243,.96);--text:#111;--t2:#666;--t3:#aaa;--accent:#534AB7;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#17161a;--card:#222028;--cb:rgba(255,255,255,.09);--cbh:rgba(255,255,255,.2);
  --hbg:rgba(23,22,26,.96);--text:#ededea;--t2:#999;--t3:#555;--accent:#7F77DD;
}}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}
.hdr{background:var(--hbg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--cb);padding:12px 20px;flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
h1{font-size:17px;font-weight:500;display:inline}
.sub{font-size:12px;color:var(--t2);margin-left:8px}
.vc{font-size:12px;color:var(--t2)}
.vc b{color:var(--accent);font-weight:600}
.flt{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;min-width:190px}
.fl{font-size:11px;color:var(--t2);margin-bottom:7px}
.fl b{color:var(--accent);font-weight:600}
#srch{height:32px;padding:0 10px;border:1px solid var(--cbh);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;outline:none;min-width:160px}
#srch:focus{border-color:var(--accent)}
#tsel{height:32px;padding:0 8px;border:1px solid var(--cbh);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;outline:none;cursor:pointer}
.noUi-target{background:rgba(83,74,183,.15);border:none;box-shadow:none;height:4px}
.noUi-connect{background:var(--accent)}
.noUi-handle{width:14px!important;height:14px!important;top:-5px!important;right:-7px!important;border-radius:50%;background:var(--accent);border:2px solid var(--card);box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:grab}
.noUi-handle:before,.noUi-handle:after{display:none}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.bump-col{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;padding:16px 8px 20px 20px}
.hint{font-size:12px;color:var(--t3);margin-bottom:10px}
#bumpWrap svg{display:block;width:100%}
.sel-col{width:295px;flex-shrink:0;border-left:1px solid var(--cb);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.sel-col-inner{flex:1;overflow-y:auto;padding:16px}
.sel-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--t3);font-size:13px;line-height:1.8;gap:4px}
.sel-empty svg{opacity:.25;margin-bottom:8px}
.sel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sel-title{font-size:13px;font-weight:500}
.cl-btn{border:1px solid var(--cbh);background:none;color:var(--t2);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:16px;font-size:12px;font-weight:500;border:1.5px solid;cursor:pointer;transition:opacity .15s}
.chip:hover{opacity:.75}
.chip-x{font-size:13px;line-height:1;margin-left:1px;opacity:.55}
.mode-row{display:flex;gap:4px;margin-bottom:12px}
.mbtn{border:1px solid var(--cbh);background:none;color:var(--t2);border-radius:6px;padding:4px 11px;font-size:12px;cursor:pointer}
.mbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cw{height:220px;position:relative}
.cmp-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cleg{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px}
.cleg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── mobile ─────────────────────────────── */
@media(max-width:640px){
  html,body{height:auto;overflow-y:auto;overflow-x:hidden}
  .hdr{padding:10px 12px}
  .hdr-top{flex-wrap:wrap;gap:6px;margin-bottom:8px}
  h1{font-size:15px}
  .sub{display:none}
  .vc{font-size:12px;white-space:nowrap}
  .flt{gap:10px}
  .fg{min-width:0;width:100%}
  #srch{width:100%;min-width:0}
  #tsel{width:100%}
  .main{overflow:visible;flex:none}
  .bump-col{overflow:visible;padding:10px 4px 120px 10px}
  /* right panel: hidden when empty, bottom sheet when has selections */
  .sel-col{
    position:fixed;bottom:0;left:0;right:0;
    width:100%!important;
    max-height:52vh;
    border-left:none;
    border-top:1px solid var(--cb);
    border-radius:16px 16px 0 0;
    box-shadow:0 -4px 24px rgba(0,0,0,.18);
    z-index:200;
    transition:transform .25s ease;
  }
  .sel-col.is-empty{transform:translateY(100%);pointer-events:none}
  .sel-col-inner{padding:12px 14px}
  .cw{height:180px}
}
</style>

  var isMobile=SW<500;
  ML=isMobile?80:SW<700?100:120;
  MR=isMobile?12:SW<700?105:125;
  CW=SW-ML-MR;
  var rowH=N<=20?24:N<=40?18:N<=70?14:10;
  CH=Math.max((N-1)*rowH,20);
  var SH=MT+CH+MB;
  var rmap=computeRanks(vis);
  var hasSel=sel.size>0;

  var s='<svg viewBox="0 0 '+SW+' '+SH+'" preserveAspectRatio="none" style="display:block;width:100%;height:'+SH+'px;overflow:visible">';

  YRS.forEach(function(y,i){
    var x=xP(i).toFixed(1);
    s+='<text x="'+x+'" y="'+(MT-10)+'" text-anchor="middle" font-size="11" fill="currentColor" opacity=".4">'+y+'</text>';
    s+='<line x1="'+x+'" y1="'+MT+'" x2="'+x+'" y2="'+(MT+CH)+'" stroke="currentColor" stroke-width=".5" opacity=".05"/>';
  });

  // rank ticks: drawn inside chart area so they don't clash with name labels
  var tickSet=[1];
  if(N>2)tickSet.push(Math.round(N/2));
  if(N>1)tickSet.push(N);
  tickSet.forEach(function(r){
    s+='<text x="'+(ML+4)+'" y="'+(yP(r,N)-3).toFixed(1)+'" text-anchor="start" font-size="9" fill="currentColor" opacity=".25">#'+r+'</text>';
  });

  for(var gi=1;gi<=N;gi++){
    s+='<line x1="'+ML+'" y1="'+yP(gi,N).toFixed(1)+'" x2="'+(ML+CW)+'" y2="'+yP(gi,N).toFixed(1)+'" stroke="currentColor" stroke-width=".5" opacity=".05"/>';
  }

  vis.forEach(function(d){
    var didx=d.r-1,c=COLORS[didx],rr=rmap[d.n];
    var isSel=sel.has(didx);
    var op=hasSel?(isSel?'1':'.1'):(hov===didx?'1':'.65');
    var sw=hasSel?(isSel?'3':'1'):(hov===didx?'3.5':'1.8');
    var fs=N>50?'9':N>30?'10':'12';
    var dotR=N>50?'1.5':N>30?'2':'3';
    var dotRSel=N>50?'3':N>30?'3.5':'4.5';
    var path=bzPath(rr,N);
    var r0=rr[0],r11=rr[11];
    s+='<g data-didx="'+didx+'">';
    if(path)s+='<path d="'+path+'" fill="none" stroke="'+c+'" stroke-width="'+sw+'" opacity="'+op+'" stroke-linecap="round" stroke-linejoin="round"/>';
    // dots: filled if has data, hollow if no data that year
    if(N<=60||isSel||hov===didx){
      rr.forEach(function(r,i){
        var hasData=d.yv[i]>0;
        var dr=isSel||hov===didx?dotRSel:dotR;
        if(hasData){
          s+='<circle cx="'+xP(i).toFixed(1)+'" cy="'+yP(r,N).toFixed(1)+'" r="'+dr+'" fill="'+c+'" opacity="'+op+'"/>';
        } else if(N<=40||isSel||hov===didx){
          s+='<circle cx="'+xP(i).toFixed(1)+'" cy="'+yP(r,N).toFixed(1)+'" r="'+dr+'" fill="none" stroke="'+c+'" stroke-width="1" opacity="'+(+op*0.4).toFixed(2)+'"/>';
        }
      });
    }
    // labels always shown (all names have ranks for all years now)
    s+='<text x="'+(ML-8)+'" y="'+(yP(rr[0],N)+4).toFixed(1)+'" text-anchor="end" font-size="'+fs+'" font-weight="500" fill="'+c+'" opacity="'+op+'">'+d.n+'</text>';
    if(MR>=50)s+='<text x="'+(ML+CW+8)+'" y="'+(yP(rr[11],N)+4).toFixed(1)+'" text-anchor="start" font-size="'+fs+'" font-weight="500" fill="'+c+'" opacity="'+op+'">'+(isSel?'✓ ':'')+d.n+'</text>';
    s+='</g>';
  });
  s+='</svg>';
  document.getElementById('bumpWrap').innerHTML=s;
}

function updOpacity(){
  var hasSel=sel.size>0,fs=curN>40?'10':'12';
  document.querySelectorAll('#bumpWrap [data-didx]').forEach(function(g){
    var didx=+g.dataset.didx,isSel=sel.has(didx),isHov=hov===didx;
    var op=hasSel?(isSel?'1':isHov?'.4':'.1'):(isHov?'1':'.65');
    var sw=hasSel?(isSel?'3':isHov?'1.5':'1'):(isHov?'3.5':'1.8');
    g.querySelectorAll('path').forEach(function(p){p.setAttribute('opacity',op);p.setAttribute('stroke-width',sw);});
    g.querySelectorAll('circle').forEach(function(c){c.setAttribute('opacity',op);c.setAttribute('r',isSel||isHov?'4.5':'3');});
    g.querySelectorAll('text').forEach(function(t){t.setAttribute('opacity',op);});
  });
}

var bw=document.getElementById('bumpWrap');
bw.addEventListener('mouseover',function(e){var g=e.target.closest('[data-didx]');if(!g)return;var i=+g.dataset.didx;if(hov===i)return;hov=i;updOpacity();});
bw.addEventListener('mouseleave',function(){hov=-1;updOpacity();});
bw.addEventListener('click',function(e){
  var g=e.target.closest('[data-didx]');
  if(!g)return;
  var didx=+g.dataset.didx;
  if(sel.has(didx))sel.delete(didx);else sel.add(didx);
  hov=-1;
  drawBump();
  drawComparison();
});

function clearSel(){sel.clear();hov=-1;drawBump();drawComparison();}

function drawComparison(){
  var se=document.getElementById('selEmpty'),sp=document.getElementById('selPanel');
  document.querySelector('.sel-col').classList.toggle('is-empty',!sel.size);
  if(!sel.size){se.style.display='';sp.style.display='none';if(cmpChart){cmpChart.destroy();cmpChart=null;}return;}
  se.style.display='none';sp.style.display='';
  var chips='';
  sel.forEach(function(didx){
    var d=DATA[didx],c=COLORS[didx];
    chips+='<span class="chip" data-didx="'+didx+'" style="color:'+c+';border-color:'+c+'30;background:'+c+'12">'+d.n+'<span class="chip-x">×</span></span>';
  });
  document.getElementById('chips').innerHTML=chips;
  document.querySelectorAll('.chip').forEach(function(ch){
    ch.addEventListener('click',function(){
      var didx=+this.dataset.didx;
      sel.delete(didx);
      drawBump();drawComparison();
    });
  });
  var isR=chartMode==='rank';
  var ds=[];
  sel.forEach(function(didx){
    var d=DATA[didx],c=COLORS[didx];
    var vals=isR?d.yr.map(function(r){return r>0?r:null;}):d.yv.map(function(v){return v>0?v:null;});
    ds.push({label:d.n,data:vals,borderColor:c,backgroundColor:'transparent',pointRadius:4,pointHoverRadius:6,borderWidth:2.5,tension:0.35,spanGaps:false});
  });
  var ctx=document.getElementById('cmpCvs');
  if(cmpChart)cmpChart.destroy();
  cmpChart=new Chart(ctx,{type:'line',data:{labels:YRS,datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
    scales:{
      y:{reverse:isR,title:{display:true,text:isR?'Рейтинг среди 222':'Новорождённых за год',font:{size:10}},ticks:{font:{size:10}}},
      x:{ticks:{font:{size:10},maxRotation:45,minRotation:0,autoSkip:true,maxTicksLimit:8}}
    }
  }});
  var leg='';
  sel.forEach(function(didx){var d=DATA[didx],c=COLORS[didx];leg+='<span class="cleg"><span class="cleg-dot" style="background:'+c+'"></span>'+d.n+'</span>';});
  document.getElementById('cmpLeg').innerHTML=leg;
}

function setMode(m){
  chartMode=m;
  document.querySelectorAll('.mbtn').forEach(function(b){b.classList.toggle('on',b.dataset.mode===m);});
  if(sel.size)drawComparison();
}

function debounce(fn,ms){var t;return function(){var a=arguments,c=this;clearTimeout(t);t=setTimeout(function(){fn.apply(c,a);},ms);};}

document.getElementById('srch').addEventListener('input',debounce(function(){f.q=this.value.trim().toLowerCase();drawBump();},200));
document.getElementById('tsel').addEventListener('change',function(){f.trend=this.value;drawBump();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')clearSel();});

function initSliders(){
  var rs=document.getElementById('rs');
  noUiSlider.create(rs,{start:[1,20],connect:true,range:{min:1,max:TOTAL},step:1});
  rs.noUiSlider.on('update',function(v){
    f.rMin=Math.round(+v[0]);f.rMax=Math.round(+v[1]);
    document.querySelector('#rv b').textContent='#'+f.rMin+' — #'+f.rMax;
    drawBump();
  });
  var ls=document.getElementById('ls');
  noUiSlider.create(ls,{start:[MIN_LEN,MAX_LEN],connect:true,range:{min:MIN_LEN,max:MAX_LEN},step:1});
  ls.noUiSlider.on('update',function(v){
    f.lMin=Math.round(+v[0]);f.lMax=Math.round(+v[1]);
    document.querySelector('#lv b').textContent=f.lMin+'–'+f.lMax;
    drawBump();
  });
}

document.querySelector('.sel-col').classList.add('is-empty');
drawBump();
initSliders();

var _rt;
window.addEventListener('resize',function(){clearTimeout(_rt);_rt=setTimeout(drawBump,120);});

</script>
</body>
</html>
